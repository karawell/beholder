# Configuração Nginx para o Beholder
# Copiar para: /etc/nginx/sites-available/beholder
# Ativar com: sudo ln -s /etc/nginx/sites-available/beholder /etc/nginx/sites-enabled/
# Testar com: sudo nginx -t
# Recarregar: sudo systemctl reload nginx

# Suporte a upgrade de WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;  # Substitua pelo seu domínio ou IP

    # Pasta do build do React
    root /var/www/beholder;
    index index.html;

    # ---------------------------------------------------------------
    # API REST — proxy para o backend Express (porta 3001)
    # O frontend usa REACT_APP_API_URL=http://SEU_IP/api
    # ---------------------------------------------------------------
    location /api/ {
        proxy_pass         http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---------------------------------------------------------------
    # WebSocket — proxy para o server WSS do Beholder (porta 3001)
    # O frontend usa REACT_APP_WS_URL=ws://SEU_IP/ws
    # ---------------------------------------------------------------
    location /ws {
        proxy_pass          http://localhost:3001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---------------------------------------------------------------
    # Health check do backend (sem auth)
    # ---------------------------------------------------------------
    location /health {
        proxy_pass http://localhost:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------------
    # Frontend React SPA — serve arquivos estáticos
    # Qualquer rota não encontrada retorna index.html (React Router)
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Cache longo para assets com hash no nome (JS/CSS gerados pelo build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Segurança — bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
